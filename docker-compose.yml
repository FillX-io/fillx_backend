services:
  app:
    build: .
    container_name: fillx-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
